norn_ett:
  target: local
  outputs:
    local:
      type: clickhouse
      driver: http
      host: "{{ env_var('CH_HOST', 'localhost') }}"
      port: 8123
      user: norn
      password: norn
      # CH_SCHEMA lets tests build into an isolated DB (e.g. norn_ett_test)
      # instead of the live norn_ett — see tests/test_dbt_models.py.
      schema: "{{ env_var('CH_SCHEMA', 'norn_ett') }}"
      secure: false
